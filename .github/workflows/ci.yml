name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: 配置 .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 配置 uv
        uses: astral-sh/setup-uv@v5

      - name: 安装根依赖
        run: npm ci --ignore-scripts

      - name: 安装前端依赖
        run: npm ci --prefix frontend

      - name: 恢复后端依赖
        run: dotnet restore backend/AiInterview.sln

      - name: 同步 AI 服务依赖
        run: uv sync --directory ai-service --extra dev --frozen

      - name: 统一校验
        run: npm run check
